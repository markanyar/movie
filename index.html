            menu.appendChild(option);
        });
    }
    
    function getCountryAPIParam() {
        if (activeCountryCode === 'all') return '';
        if (activeCountryCode === 'world') return '&with_original_language=en|hi|ta|te|bn|ml|pa|fr|es|de|it|pt|zh|ko&sort_by=popularity.desc';
        return `&with_origin_country=${activeCountryCode}`;
    }
    
    async function loadGenres() {
        const options = { headers: { 'Authorization': `Bearer ${TMDB_READ_TOKEN}` } };
        try {
            const [movieRes, tvRes] = await Promise.all([
                fetch(`${API_BASE}/genre/movie/list?api_key=${TMDB_API_KEY}`, options),
                fetch(`${API_BASE}/genre/tv/list?api_key=${TMDB_API_KEY}`, options)
            ]);
            movieGenres = (await movieRes.json()).genres || [];
            tvGenres = (await tvRes.json()).genres || [];
        } catch(e){}
    }
    
    function buildGenreDropdown() {
        let genres = mediaType === 'movie' ? movieGenres : (mediaType === 'tv' ? tvGenres : [...movieGenres, ...tvGenres].filter((v,i,a)=>a.findIndex(t=>t.id===v.id)===i));
        let items = '<div class="genre-option" data-id="null"><i class="fas fa-fire"></i> All Genres</div>';
        genres.forEach(g => items += `<div class="genre-option" data-id="${g.id}">${g.name}</div>`);
        document.getElementById('genreDropdownMenu').innerHTML = items;
        document.querySelectorAll('.genre-option').forEach(opt => {
            opt.addEventListener('click', (e) => {
                e.stopPropagation();
                activeGenreId = opt.dataset.id === 'null' ? null : parseInt(opt.dataset.id);
                document.getElementById('selectedGenreName').innerText = opt.innerText.trim() || 'All';
                document.getElementById('genreDropdownMenu').classList.remove('show');
                document.querySelectorAll('.genre-option').forEach(o => o.classList.remove('selected'));
                opt.classList.add('selected');
                currentPage = 1;
                loadGridContent();
            });
        });
    }
    
    async function loadGridContent() {
        if(isLoading) return;
        isLoading = true;
        document.getElementById('movies-grid').innerHTML = '<div style="grid-column:1/-1; text-align:center; padding:2rem;"><i class="fas fa-spinner fa-spin"></i> Loading...</div>';
        filterYear = document.getElementById('filter-year').value;
        filterRating = document.getElementById('filter-rating').value;
        filterSort = document.getElementById('filter-sort').value;
        let url = '';
        const baseParams = `&page=${currentPage}&sort_by=${filterSort}`;
        const voteFilter = filterRating ? `&vote_average.gte=${filterRating}` : '';
        const yearFilter = filterYear ? (mediaType === 'movie' ? `&primary_release_year=${filterYear}` : `&first_air_date_year=${filterYear}`) : '';
        const countryParam = (mediaType !== 'anime' && activeCountryCode !== 'all' && activeCountryCode !== 'world') ? `&with_origin_country=${activeCountryCode}` : (activeCountryCode === 'world' && mediaType !== 'anime' ? '&with_original_language=en|hi|ta|te|bn|ml|pa|fr|es|de|it|pt|zh|ko' : '');
        const extraWorld = (activeCountryCode === 'world' && mediaType !== 'anime') ? '&sort_by=popularity.desc' : '';
        if(mediaType === 'movie') {
            let genrePart = activeGenreId ? `&with_genres=${activeGenreId}` : '';
            url = `${API_BASE}/discover/movie?api_key=${TMDB_API_KEY}${genrePart}${baseParams}${voteFilter}${yearFilter}${countryParam}${extraWorld}`;
        } else if(mediaType === 'tv') {
            let genrePart = activeGenreId ? `&with_genres=${activeGenreId}` : '';
            url = `${API_BASE}/discover/tv?api_key=${TMDB_API_KEY}${genrePart}${baseParams}${voteFilter}${yearFilter}${countryParam}${extraWorld}`;
        } else {
            await loadAnimeGrid();
            isLoading = false; updatePagination(); return;
        }
        try {
            const res = await fetch(url, { headers: { 'Authorization': `Bearer ${TMDB_READ_TOKEN}` } });
            const data = await res.json();
            renderGrid(data.results || [], mediaType);
            totalPages = Math.min(data.total_pages || 1, 20);
        } catch(e) { document.getElementById('movies-grid').innerHTML = '<p style="color:red;text-align:center;">Error</p>'; }
        finally { isLoading = false; updatePagination(); }
    }
    
    async function loadAnimeGrid() {
        const baseParams = `&page=${currentPage}&sort_by=${filterSort}`;
        const voteFilter = filterRating ? `&vote_average.gte=${filterRating}` : '';
        const yearFilter = filterYear ? `&first_air_date_year=${filterYear}` : '';
        const movieUrl = `${API_BASE}/discover/movie?api_key=${TMDB_API_KEY}&with_genres=16&with_original_language=ja${baseParams}${voteFilter}${yearFilter.replace('first_air_date_year','primary_release_year')}`;
        const tvUrl = `${API_BASE}/discover/tv?api_key=${TMDB_API_KEY}&with_genres=16&with_original_language=ja${baseParams}${voteFilter}${yearFilter}`;
        const [mRes, tRes] = await Promise.all([fetch(movieUrl,{headers:{'Authorization':`Bearer ${TMDB_READ_TOKEN}`}}), fetch(tvUrl,{headers:{'Authorization':`Bearer ${TMDB_READ_TOKEN}`}})]);
        const mData=await mRes.json(), tData=await tRes.json();
        let combined = [...(mData.results||[]).map(m=>({...m, media_type:'movie', isAnime:true})), ...(tData.results||[]).map(t=>({...t, media_type:'tv', isAnime:true}))];
        combined.sort((a,b)=> (b.popularity||0)-(a.popularity||0));
        renderGrid(combined, 'anime');
        totalPages = 10;
    }
    
    function renderGrid(items, type){
        const gridDiv = document.getElementById('movies-grid');
        gridDiv.innerHTML = '';
        if(!items.length){ gridDiv.innerHTML='<div style="grid-column:1/-1; text-align:center; padding:3rem;">No results</div>'; return; }
        items.forEach(item => gridDiv.appendChild(createCard(item, type)));
    }
    
    function createCard(item, forcedType){
        const card = document.createElement('div'); card.className = 'movie-card';
        let type = item.media_type || forcedType;
        const isAnime = item.isAnime || forcedType === 'anime';
        const title = (type === 'movie') ? (item.title || item.name) : (item.name || item.title);
        const year = (type === 'movie' ? item.release_date : item.first_air_date)?.slice(0,4) || 'N/A';
        const rating = item.vote_average || 0;
        const ratingClass = rating >= 7.5 ? 'green' : rating >= 5 ? 'orange' : 'red';
        const poster = item.poster_path ? IMG_BASE+item.poster_path : 'https://via.placeholder.com/300x450?text=No+Poster';
        let badges = '';
        if(type === 'tv') badges += '<span class="tv-badge">TV</span>';
        if(isAnime) badges += '<span class="anime-badge">ANIME</span>';
        card.innerHTML = `<img class="movie-poster" src="${poster}" loading="lazy">${badges}<div class="movie-info"><h3>${title}</h3><div class="movie-meta"><span class="${ratingClass}"><i class="fas fa-star"></i>${rating.toFixed(1)}</span><span>${year}</span></div></div><div class="play-overlay"><i class="fas fa-play"></i></div>`;
        card.addEventListener('click', ()=> openPlayer(item.id, type, isAnime));
        return card;
    }
    
    async function loadCarousel() {
        const options = { headers: { 'Authorization': `Bearer ${TMDB_READ_TOKEN}` } };
        const [movieNow, tvNow] = await Promise.all([
            fetch(`${API_BASE}/movie/now_playing?api_key=${TMDB_API_KEY}&page=1`, options),
            fetch(`${API_BASE}/tv/on_the_air?api_key=${TMDB_API_KEY}&page=1`, options)
        ]);
        let slides = [...(await movieNow.json()).results.slice(0,6).map(m=>({...m, media_type:'movie'})), ...(await tvNow.json()).results.slice(0,6).map(t=>({...t, media_type:'tv'}))];
        slides.sort((a,b)=>(b.popularity||0)-(a.popularity||0));
        const carouselDiv = document.getElementById('latest-carousel');
        carouselDiv.innerHTML = '';
        slides.slice(0,10).forEach(item => {
            const card = document.createElement('div'); card.className = 'slide-card';
            const poster = item.poster_path ? IMG_BASE+item.poster_path : 'https://via.placeholder.com/400x600';
            const title = item.title || item.name;
            const year = (item.release_date || item.first_air_date || '').slice(0,4);
            card.innerHTML = `<img class="slide-poster" src="${poster}"><div class="slide-info"><h4>${title}</h4><div class="slide-meta"><span>${year}</span><span>⭐ ${item.vote_average?.toFixed(1)||'?'}</span></div></div>`;
            card.addEventListener('click',()=> openPlayer(item.id, item.media_type, false));
            carouselDiv.appendChild(card);
        });
    }
    
    function openPlayer(id, type, isAnime){
        const modal = document.getElementById('movie-modal'); modal.style.display='flex'; document.body.style.overflow='hidden';
        currentModalId=id; currentModalType=type; currentIsAnime=isAnime;
        document.getElementById('movie-player').src='';
        fetch(`${API_BASE}/${type==='movie'?'movie':'tv'}/${id}`,{headers:{'Authorization':`Bearer ${TMDB_READ_TOKEN}`}}).then(r=>r.json()).then(d=>{
            document.getElementById('movie-title-header').innerText=d.title||d.name||'';
            document.getElementById('modal-title').innerText=d.title||d.name||'';
            document.getElementById('modal-overview').innerText=d.overview||'';
            document.getElementById('modal-poster').src=d.poster_path?IMG_BASE+d.poster_path:'';
        });
        const langDiv = document.getElementById('lang-toggle-container');
        langDiv.style.display = isAnime ? 'flex' : 'none';
        if(type==='tv' || isAnime){
            document.getElementById('tv-controls').style.display='block';
            fetch(`${API_BASE}/tv/${id}`,{headers:{'Authorization':`Bearer ${TMDB_READ_TOKEN}`}}).then(r=>r.json()).then(data=>{
                const seasonSelect=document.getElementById('season-select'); seasonSelect.innerHTML='';
                if(data.seasons) data.seasons.forEach(s=>{if(s.season_number>0){let opt=document.createElement('option');opt.value=s.season_number;opt.innerText=`S${s.season_number} (${s.episode_count} eps)`;seasonSelect.appendChild(opt);}});
                currentSeason = data.seasons?.find(s=>s.season_number>0)?.season_number||1;
                loadEpisodes(id,currentSeason);
            });
        } else { document.getElementById('tv-controls').style.display='none'; buildSourceButtons(type,id,null,null,currentAudioLang,isAnime); }
    }
    
    function loadEpisodes(tvId, season){
        fetch(`${API_BASE}/tv/${tvId}/season/${season}`,{headers:{'Authorization':`Bearer ${TMDB_READ_TOKEN}`}}).then(r=>r.json()).then(data=>{
            const epSelect=document.getElementById('episode-select'); epSelect.innerHTML='';
            if(data.episodes) data.episodes.forEach(ep=>{let opt=document.createElement('option');opt.value=ep.episode_number;opt.innerText=`E${ep.episode_number}: ${ep.name}`;epSelect.appendChild(opt);});
            currentEpisode = data.episodes?.[0]?.episode_number||1;
            buildSourceButtons(currentModalType,currentModalId,currentSeason,currentEpisode,currentAudioLang,currentIsAnime);
        });
    }
    
    function buildSourceButtons(type,id,season,episode,audioLang,isAnime){
        const container=document.getElementById('source-buttons'); container.innerHTML='';
        const sources=[
            {name:'VidLink',url:`https://vidlink.pro/${type}/${id}${type==='tv'?`/${season}/${episode}`:''}?autoplay=1`},
            {name:'VidSrc',url:`https://vidsrc.xyz/embed/${type}?tmdb=${id}${type==='tv'?`&season=${season}&episode=${episode}`:''}${(isAnime&&audioLang==='dub')?'&dub=true':''}`},
            {name:'2Embed',url:`https://www.2embed.cc/embed${type==='movie'?`/movie/${id}`:`/tv/${id}&s=${season}&e=${episode}`}`}
        ];
        sources.forEach((s,idx)=>{
            const btn=document.createElement('button'); btn.className='source-btn'+(idx===currentSourceIndex?' active':''); btn.innerText=s.name;
            btn.onclick=()=>{ currentSourceIndex=idx; document.getElementById('movie-player').src=s.url; document.querySelectorAll('.source-btn').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); };
            container.appendChild(btn);
        });
        if(sources.length) document.getElementById('movie-player').src=sources[0].url;
    }
    
    function updatePagination(){
        document.getElementById('page-indicator').innerText = `Page ${currentPage}`;
        document.getElementById('prev-page').disabled = currentPage===1;
        document.getElementById('next-page').disabled = currentPage>=totalPages;
    }
    
    document.getElementById('prev-page').addEventListener('click',()=>{ if(currentPage>1){ currentPage--; loadGridContent(); } });
    document.getElementById('next-page').addEventListener('click',()=>{ if(currentPage<totalPages){ currentPage++; loadGridContent(); } });
    document.querySelectorAll('.type-btn').forEach(btn=>btn.addEventListener('click',()=>{
        document.querySelectorAll('.type-btn').forEach(b=>b.classList.remove('active')); btn.classList.add('active');
        mediaType = btn.dataset.type; activeGenreId = null; document.getElementById('selectedGenreName').innerText='All';
        buildGenreDropdown(); currentPage=1; loadGridContent();
    }));
    document.getElementById('apply-filter').addEventListener('click',()=>{ currentPage=1; loadGridContent(); });
    document.getElementById('search-input').addEventListener('input',(e)=>{
        clearTimeout(window.srch); window.srch=setTimeout(()=>{
            const q=e.target.value.trim();
            if(q) searchGlobal(q); else { activeGenreId=null; currentPage=1; loadGridContent(); }
        },400);
    });
    async function searchGlobal(query){
        isLoading=true; document.getElementById('movies-grid').innerHTML='<div style="text-align:center;"><i class="fas fa-spinner fa-spin"></i> Searching...</div>';
        if(mediaType==='anime'){ await loadAnimeGrid(); isLoading=false; updatePagination(); return; }
        let url = mediaType==='movie'? `${API_BASE}/search/movie?api_key=${TMDB_API_KEY}&query=${encodeURIComponent(query)}&page=${currentPage}` : `${API_BASE}/search/tv?api_key=${TMDB_API_KEY}&query=${encodeURIComponent(query)}&page=${currentPage}`;
        const res=await fetch(url,{headers:{'Authorization':`Bearer ${TMDB_READ_TOKEN}`}});
        const data=await res.json(); renderGrid(data.results||[],mediaType); totalPages=Math.min(data.total_pages||1,20); isLoading=false; updatePagination();
    }
    document.getElementById('countryDropdownBtn').addEventListener('click',(e)=>{ e.stopPropagation(); document.getElementById('countryDropdownMenu').classList.toggle('show'); });
    document.getElementById('genreDropdownBtn').addEventListener('click',(e)=>{ e.stopPropagation(); document.getElementById('genreDropdownMenu').classList.toggle('show'); });
    document.addEventListener('click',()=>{ document.getElementById('countryDropdownMenu')?.classList.remove('show'); document.getElementById('genreDropdownMenu')?.classList.remove('show'); });
    document.getElementById('back-btn').addEventListener('click',()=>{ document.getElementById('movie-player').src=''; document.getElementById('movie-modal').style.display='none'; document.body.style.overflow=''; });
    document.getElementById('refresh-player').addEventListener('click',()=>{ let p=document.getElementById('movie-player'); let src=p.src; p.src=''; setTimeout(()=>p.src=src,100); });
    document.getElementById('season-select')?.addEventListener('change',(e)=>{ currentSeason=parseInt(e.target.value); loadEpisodes(currentModalId,currentSeason); });
    document.getElementById('episode-select')?.addEventListener('change',(e)=>{ currentEpisode=parseInt(e.target.value); buildSourceButtons(currentModalType,currentModalId,currentSeason,currentEpisode,currentAudioLang,currentIsAnime); });
    document.getElementById('lang-sub')?.addEventListener('click',()=>{ document.getElementById('lang-sub').classList.add('active'); document.getElementById('lang-dub').classList.remove('active'); currentAudioLang='sub'; if(currentModalType==='tv') buildSourceButtons(currentModalType,currentModalId,currentSeason,currentEpisode,'sub',currentIsAnime); else buildSourceButtons(currentModalType,currentModalId,null,null,'sub',currentIsAnime); });
    document.getElementById('lang-dub')?.addEventListener('click',()=>{ document.getElementById('lang-dub').classList.add('active'); document.getElementById('lang-sub').classList.remove('active'); currentAudioLang='dub'; if(currentModalType==='tv') buildSourceButtons(currentModalType,currentModalId,currentSeason,currentEpisode,'dub',currentIsAnime); else buildSourceButtons(currentModalType,currentModalId,null,null,'dub',currentIsAnime); });
    
    (async ()=>{
        await loadGenres(); buildCountryDropdown(); buildGenreDropdown(); loadCarousel(); loadGridContent();
    })();
})();
</script>
</body>
</html>
