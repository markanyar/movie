<html lang="en">

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {

            background: #000;
            color: #fff;
            overflow-x: hidden;
            min-height: 100vh;
        }
        /* ===== HEADER (compact) ===== */
        header {
            padding: 1rem 2rem;
            background: linear-gradient(to bottom, #000, transparent);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 1000;
            backdrop-filter: blur(12px);
            transition: 0.2s;
        }
        header.compact { padding: 0.6rem 1.5rem; background: rgba(0,0,0,0.98); box-shadow: 0 4px 20px #000; }
        h1 {
            color: #e50914;
            font-size: 2rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
        }
        #search-container {
            flex-grow: 1;
            max-width: 450px;
            margin: 0 2rem;
            position: relative;
        }
        #search-input {
            width: 100%;
            padding: 0.8rem 1.2rem 0.8rem 3rem;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 40px;
            color: white;
            font-size: 1rem;
            backdrop-filter: blur(8px);
        }
        #search-input:focus {
            outline: none;
            border-color: #e50914;
            box-shadow: 0 0 15px #e5091433;
        }
        .search-icon {
            position: absolute; left: 1rem; top: 50%; transform: translateY(-50%);
            color: rgba(255,255,255,0.6);
        }
        .user-btn {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            width: 44px; height: 44px;
            border-radius: 50%;
            cursor: pointer;
            transition: 0.2s;
        }
        .user-btn:hover { background: #e50914; transform: scale(1.08); }
        /* ===== FILTER ROW – now with dropdown for phone ===== */
        .filters {
            padding: 0.8rem 1rem;
            background: rgba(10,10,10,0.98);
            position: fixed;
            top: 72px; left: 0; right: 0;
            z-index: 999;
            backdrop-filter: blur(12px);
            border-bottom: 1px solid #222;
        }
        .filter-row {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            max-width: 1400px;
            margin: 0 auto;
            flex-wrap: wrap;
        }
        .media-type-selector {
            display: flex;
            gap: 0.5rem;
            border-right: 1px solid #333;
            padding-right: 0.8rem;
        }
        .type-btn {
            padding: 0.6rem 1.3rem;
            background: transparent;
            border: 1px solid #444;
            border-radius: 30px;
            color: #ccc;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: 0.2s;
            white-space: nowrap;
        }
        .type-btn.active { background: #e50914; border-color: #e50914; color: white; }
        .type-btn:hover { background: #e50914; color: white; }

        .genre-dropdown-container {
            position: relative;
            flex: 1 1 auto;
            min-width: 160px;
        }
        .genre-dropdown-button {
            width: 100%;
            background: rgba(30,30,30,0.9);
            border: 1px solid #444;
            color: #eee;
            padding: 0.6rem 2rem 0.6rem 1.2rem;
            border-radius: 40px;
            font-size: 0.95rem;
            font-weight: 500;
            text-align: left;
            cursor: pointer;
            backdrop-filter: blur(8px);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            display: flex;
            align-items: center;
            gap: 0.4rem;
            transition: 0.2s;
        }
        .genre-dropdown-button i {
            margin-right: 0.2rem;
            color: #e50914;
        }
        .genre-dropdown-button::after {
            content: '\f078';
            font-family: 'Font Awesome 6 Free'; font-weight: 900;
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: #aaa;
            font-size: 0.8rem;
            pointer-events: none;
        }
        .genre-dropdown-menu {
            position: absolute;
            top: calc(100% + 8px);
            left: 0;
            right: 0;
            background: #1f1f1f;
            border: 1px solid #333;
            border-radius: 28px;
            max-height: 320px;
            overflow-y: auto;
            z-index: 1000;
            display: none;
            box-shadow: 0 20px 35px #000;
            backdrop-filter: blur(16px);
            padding: 0.5rem 0;
        }
        .genre-dropdown-menu.show {
            display: block;
        }
        .genre-option {
            padding: 0.8rem 1.4rem;
            color: #ddd;
            font-size: 0.95rem;
            cursor: pointer;
            transition: 0.1s;
            border-bottom: 1px solid #2a2a2a;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .genre-option:last-child { border-bottom: none; }
        .genre-option:hover,
        .genre-option.selected {
            background: #e50914;
            color: white;
        }
        .genre-option i {
            width: 1.5rem;
            color: inherit;
        }
        /* ===== MAIN GRID ===== */
        #movies-grid {

        .movie-card {

            height: 220px;
            object-fit: cover;
            display: block;

        .movie-info {

            font-size: 0.95rem;
            margin-bottom: 0.3rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;

            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;

        .green { color: #21d07a; }
        .orange { color: #d2d531; }
        .red { color: #db2360; }

            background: #e50914; color: white; padding: 0.2rem 0.6rem;
            border-radius: 20px; font-size: 0.65rem; font-weight: bold;
            z-index: 5;
        }
        .play-overlay {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%) scale(0.8);
            background: #e50914; width: 48px; height: 48px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            opacity: 0; transition: 0.2s; cursor: pointer; border: 2px solid rgba(255,255,255,0.3);
        }
        .movie-card:hover .play-overlay { opacity: 1; transform: translate(-50%,-50%) scale(1); }

        .movie-modal {
            display: none;
            position: fixed; inset: 0;
            background: black;
            z-index: 2000;
        }
        .modal-content {
            width: 100%; height: 100%;
            display: flex; flex-direction: column;
            background: #000;
        }
        .top-controls {

            background: linear-gradient(to bottom, #000, transparent);
            display: flex; justify-content: space-between; align-items: center;
            z-index: 100;

        .back-btn, .control-btn {
            background: rgba(20,20,20,0.9);
            border: 1px solid #333;
            color: white; width: 42px; height: 42px; border-radius: 50%;
            cursor: pointer; transition: 0.2s;
        }
        .back-btn:hover, .control-btn:hover { background: #e50914; }
        .movie-title-header {
            font-size: 1.3rem; font-weight: 600;
            text-align: center; text-shadow: 0 2px 8px black;
        }
        .player-main-area {
            flex: 1 1 auto;
            position: relative;
            background: #000;
            min-height: 0;
        }
        .player-container {
            width: 100%; height: 100%;
            position: relative;
        }
        #movie-player {
            width: 100%; height: 100%;
            border: none; background: black;
        }
        /* Skip Intro/Outro Buttons */
        .skip-btn {
            position: absolute;
            bottom: 100px;
            right: 20px;
            background: rgba(0,0,0,0.8);
            border: 2px solid #e50914;
            color: white;
            padding: 12px 24px;
            border-radius: 40px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            z-index: 100;
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            gap: 8px;
            transition: 0.2s;
            animation: slideIn 0.3s ease;
            box-shadow: 0 4px 15px rgba(229,9,20,0.3);
        }
        .skip-btn:hover {
            background: #e50914;
            transform: scale(1.05);
        }
        .skip-btn i {
            font-size: 1.2rem;
        }
        .skip-timer {
            background: rgba(255,255,255,0.2);
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 0.9rem;
            margin-left: 8px;
        }
        @keyframes slideIn {
            from { transform: translateX(100px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        .info-bar {
            background: #0c0c0c;
            border-top: 1px solid #222;
            padding: 1rem;
            max-height: 40vh;
            overflow-y: auto;
        }
        .movie-info-content {
            display: flex;
            gap: 1rem;
        }
        .movie-info-poster {
            width: 80px; height: 120px; object-fit: cover; border-radius: 12px;
        }
        .movie-details { flex: 1; }
        .movie-details h2 { font-size: 1.4rem; margin-bottom: 0.2rem; }
        .movie-meta-large {
            display: flex; gap: 1rem; flex-wrap: wrap; margin-bottom: 0.6rem; font-size: 0.9rem;
        }
        .movie-overview {
            max-height: 70px; overflow-y: auto; color: #aaa; line-height: 1.4;
            margin-bottom: 0.8rem; font-size: 0.9rem;
        }
        .source-section {
            background: #1a1a1a; border-radius: 30px; padding: 0.8rem 1.2rem;
            margin-top: 0.6rem;
        }
        .source-section h4 {
            color: #e50914; font-size: 1rem; margin-bottom: 0.5rem; display: flex; gap: 0.4rem;
        }
        .source-buttons {
            display: flex; flex-wrap: wrap; gap: 0.5rem;
        }
        .source-btn {
            background: #2a2a2a; border: 1px solid #3a3a3a; color: #ddd;
            padding: 0.4rem 1rem; border-radius: 30px; font-size: 0.8rem;
            cursor: pointer; transition: 0.15s;
        }
        .source-btn.active, .source-btn:hover {
            background: #e50914; border-color: #e50914; color: white;
        }
        .tv-controls {
            background: #1a1a1a; border-radius: 40px; padding: 0.8rem 1.2rem;
            margin-top: 0.8rem; display: flex; flex-wrap: wrap; gap: 1rem;
            align-items: center;
        }
        .tv-controls select {
            background: #2a2a2a; border: 1px solid #444; color: white;
            padding: 0.3rem 0.8rem; border-radius: 30px; margin-left: 0.3rem;
        }
        /* language toggle for anime SUB / DUB */
        .lang-toggle {
            background: #1a1a1a; border-radius: 40px; padding: 0.6rem 1.2rem;
            margin-top: 0.6rem; display: flex; gap: 0.8rem; align-items: center;
        }
        .lang-btn {
            background: #2a2a2a; border: 1px solid #444; color: #ccc;
            padding: 0.4rem 1.2rem; border-radius: 30px; cursor: pointer;
        }
        .lang-btn.active {
            background: #e50914; border-color: #e50914; color: white;

        .loading-spinner {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%);
            border: 5px solid #222; border-top-color: #e50914; border-radius: 50%;
            width: 60px; height: 60px; animation: spin 0.8s linear infinite;
            display: none; z-index: 5000;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        @media (max-width: 600px) {
            .movie-info-content { flex-direction: column; }
            .top-controls { padding: 0.5rem; }
            .movie-title-header { font-size: 1.1rem; }
            .filters { top: 62px; }
            #movies-grid { padding-top: 140px; }
            .genre-dropdown-button { font-size: 0.9rem; padding: 0.5rem 2rem 0.5rem 1rem; }
            .skip-btn { bottom: 80px; right: 10px; padding: 8px 16px; font-size: 0.9rem; }
        }
    </style>
</head>

</div>

    const selectedGenreNameSpan = document.getElementById('selectedGenreName');
    const langToggleContainer = document.getElementById('lang-toggle-container');
    const langSubBtn = document.getElementById('lang-sub');
    const langDubBtn = document.getElementById('lang-dub');
    const skipIntroBtn = document.getElementById('skip-intro-btn');
    const skipOutroBtn = document.getElementById('skip-outro-btn');
    const skipIntroTimer = document.getElementById('skip-intro-timer');
    const skipOutroTimer = document.getElementById('skip-outro-timer');

    // Modal info elements
    const modalPoster = document.getElementById('modal-poster');
    const modalTitle = document.getElementById('modal-title');
    const modalRating = document.getElementById('modal-rating');
    const modalYear = document.getElementById('modal-year');
    const modalRuntime = document.getElementById('modal-runtime');
    const modalGenresSpan = document.getElementById('modal-genres');
    const modalOverview = document.getElementById('modal-overview');

    // ========== INIT ==========
    document.addEventListener('DOMContentLoaded', async () => {
        await loadGenres();
        buildGenreDropdown();
        loadContent();
        setupEventListeners();
        setupScrollHeader();
    });

    async function loadGenres() {
        const options = { headers: { 'Authorization': `Bearer ${TMDB_READ_TOKEN}` } };
        try {
            const [movieRes, tvRes] = await Promise.all([
                fetch(`${API_BASE}/genre/movie/list?api_key=${TMDB_API_KEY}`, options),
                fetch(`${API_BASE}/genre/tv/list?api_key=${TMDB_API_KEY}`, options)
            ]);
            const movieData = await movieRes.json();
            const tvData = await tvRes.json();
            movieGenres = movieData.genres || [];
            tvGenres = tvData.genres || [];
        } catch (e) { console.warn('genres failed', e); }
    }

    function buildGenreDropdown() {
        let genres = [];
        if (mediaType === 'movie') genres = movieGenres;
        else if (mediaType === 'tv') genres = tvGenres;
        else if (mediaType === 'anime') {
            const combined = [...movieGenres, ...tvGenres];
            genres = Array.from(new Map(combined.map(g=>[g.id, g])).values());
        }
        let items = '<div class="genre-option" data-id="null"><i class="fas fa-fire"></i> All</div>';
        genres.forEach(g => {
            items += `<div class="genre-option" data-id="${g.id}"><i class="fas fa-film"></i> ${g.name}</div>`;
        });
        genreDropdownMenu.innerHTML = items;
        document.querySelectorAll('.genre-option').forEach(opt => {
            opt.addEventListener('click', (e) => {
                e.stopPropagation();
                const id = opt.dataset.id === 'null' ? null : parseInt(opt.dataset.id);
                activeGenreId = id;
                selectedGenreNameSpan.innerText = opt.innerText.trim() || 'All';
                genreDropdownMenu.classList.remove('show');
                document.querySelectorAll('.genre-option').forEach(o => o.classList.remove('selected'));
                opt.classList.add('selected');
                currentPage = 1;
                loadContent();
            });
        });
        const allOpt = document.querySelector('.genre-option[data-id="null"]');
        if (allOpt) allOpt.classList.add('selected');
    }

    genreDropdownBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        genreDropdownMenu.classList.toggle('show');
    });
    document.addEventListener('click', (e) => {
        if (!genreDropdownContainer.contains(e.target)) {
            genreDropdownMenu.classList.remove('show');
        }
    });

    function rebuildDropdownAfterTypeChange() {
        buildGenreDropdown();
        activeGenreId = null;
        selectedGenreNameSpan.innerText = 'All';
        currentPage = 1;
        loadContent();
    }

    function setupEventListeners() {
        typeBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                typeBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                mediaType = btn.dataset.type;
                rebuildDropdownAfterTypeChange();
            });
        });

        searchInput.addEventListener('input', (e) => {
            clearTimeout(window.searchDelay);
            window.searchDelay = setTimeout(() => {
                const q = e.target.value.trim();
                if (q) searchContent(q);
                else { activeGenreId = null; currentPage = 1; loadContent(); }
            }, 400);
        });

        backBtn.addEventListener('click', closePlayer);
        refreshBtn.addEventListener('click', reloadCurrentSource);
        retryBtn.addEventListener('click', () => {
            playerError.style.display = 'none';
            tryNextSource(currentSourceIndex + 1);
        });

        fullscreenToggle.addEventListener('click', toggleFullscreenModal);

        seasonSelect.addEventListener('change', (e) => {
            currentSeason = parseInt(e.target.value);
            loadEpisodesForSeason(currentSeason);
        });
        episodeSelect.addEventListener('change', (e) => {
            currentEpisode = parseInt(e.target.value);
            if (currentItemId) {
                currentSourceIndex = 0;
                if (mediaType === 'anime') loadAnimeStream(0);
                else if (mediaType === 'tv') loadTVStream(0);
                resetSkipButtons();
            }
        });

        // Skip button listeners
        skipIntroBtn.addEventListener('click', () => {
            skipIntro();
        });
        skipOutroBtn.addEventListener('click', () => {
            skipOutro();
        });

        // Language toggle for anime
        langSubBtn.addEventListener('click', () => {
            langSubBtn.classList.add('active');
            langDubBtn.classList.remove('active');
            currentLang = 'sub';
            if (currentItemId && mediaType === 'anime') {
                currentSourceIndex = 0;
                loadAnimeStream(0);
            }
        });
        langDubBtn.addEventListener('click', () => {
            langDubBtn.classList.add('active');
            langSubBtn.classList.remove('active');
            currentLang = 'dub';
            if (currentItemId && mediaType === 'anime') {
                currentSourceIndex = 0;
                loadAnimeStream(0);
            }
        });

        window.addEventListener('scroll', () => {
            if (window.innerHeight + window.scrollY >= document.body.offsetHeight - 400 && !isLoading) {
                currentPage++;
                loadMoreContent();
            }
        });

        document.getElementById('fullscreen-toggle').addEventListener('click', () => {
            if (!document.fullscreenElement) document.documentElement.requestFullscreen();
            else document.exitFullscreen();
        });

        // Listen for messages from iframe to track video progress (simulated)
        window.addEventListener('message', (event) => {
            // This would require the embed to send timeupdate events
            // For demo purposes, we'll simulate with a timer
        });
    }

    // Skip Intro/Outro Functions
    function setupSkipButtons() {
        resetSkipButtons();
        
        // Show intro button after 30 seconds of playback
        if (mediaType === 'tv' || mediaType === 'anime') {
            skipIntroTimeout = setTimeout(() => {
                showSkipIntroButton();
            }, 25000); // Show at 25 seconds (typical intro ends around 90s)
            
            // Show outro button near the end (simulated)
            // In a real implementation, you'd get episode duration from TMDB
            setTimeout(() => {
                showSkipOutroButton();
            }, 1200000); // This is just a placeholder
        }
    }

    function showSkipIntroButton() {
        let countdown = SKIP_BUTTON_DELAY;
        skipIntroTimer.textContent = `${countdown}s`;
        skipIntroBtn.style.display = 'flex';
        
        const countdownInterval = setInterval(() => {
            countdown--;
            skipIntroTimer.textContent = `${countdown}s`;
            if (countdown <= 0) {
                clearInterval(countdownInterval);
            }
        }, 1000);
        
        // Auto-hide after 10 seconds if not clicked
        setTimeout(() => {
            if (skipIntroBtn.style.display === 'flex') {
                skipIntroBtn.style.display = 'none';
            }
        }, 10000);
    }

    function showSkipOutroButton() {
        let countdown = SKIP_BUTTON_DELAY;
        skipOutroTimer.textContent = `${countdown}s`;
        skipOutroBtn.style.display = 'flex';
        
        const countdownInterval = setInterval(() => {
            countdown--;
            skipOutroTimer.textContent = `${countdown}s`;
            if (countdown <= 0) {
                clearInterval(countdownInterval);
            }
        }, 1000);
        
        setTimeout(() => {
            if (skipOutroBtn.style.display === 'flex') {
                skipOutroBtn.style.display = 'none';
            }
        }, 10000);
    }

    function skipIntro() {
        // In a real implementation, you'd seek forward 90 seconds
        // For now, we'll just hide the button and reload with a timestamp parameter
        console.log('Skipping intro...');
        skipIntroBtn.style.display = 'none';
        
        // Try to seek by reloading with timestamp parameter if supported
        const currentUrl = player.src;
        if (currentUrl.includes('?')) {
            player.src = currentUrl + '&t=90'; // Start at 90 seconds
        } else {
            player.src = currentUrl + '?t=90';
        }
        
        clearTimeout(skipIntroTimeout);
    }

    function skipOutro() {
        console.log('Skipping outro...');
        skipOutroBtn.style.display = 'none';
        
        // For outro, we'd normally skip to next episode
        if (mediaType === 'tv' || mediaType === 'anime') {
            // Auto-load next episode
            const nextEpisode = currentEpisode + 1;
            const seasonEpisodes = episodeSelect.options.length;
            if (nextEpisode <= seasonEpisodes) {
                episodeSelect.value = nextEpisode;
                currentEpisode = nextEpisode;
                if (mediaType === 'anime') {
                    loadAnimeStream(currentSourceIndex);
                } else {
                    loadTVStream(currentSourceIndex);
                }
            }
        }
        
        clearTimeout(skipOutroTimeout);
    }

    function resetSkipButtons() {
        skipIntroBtn.style.display = 'none';
        skipOutroBtn.style.display = 'none';
        if (skipIntroTimeout) clearTimeout(skipIntroTimeout);
        if (skipOutroTimeout) clearTimeout(skipOutroTimeout);
    }

    // ========== API LOAD ==========
    async function loadContent() {
        showLoading();
        grid.innerHTML = '';
        let url = '';
        if (mediaType === 'movie') {
            if (activeGenreId) {
                url = `${API_BASE}/discover/movie?api_key=${TMDB_API_KEY}&with_genres=${activeGenreId}&page=${currentPage}`;
            } else {
                url = `${API_BASE}/movie/popular?api_key=${TMDB_API_KEY}&page=${currentPage}`;
            }
        } else if (mediaType === 'tv') {
            if (activeGenreId) {
                url = `${API_BASE}/discover/tv?api_key=${TMDB_API_KEY}&with_genres=${activeGenreId}&page=${currentPage}`;
            } else {
                url = `${API_BASE}/tv/popular?api_key=${TMDB_API_KEY}&page=${currentPage}`;
            }
        } else if (mediaType === 'anime') {
            if (activeGenreId) {
                await loadAnimeContent(activeGenreId);
                hideLoading();
                return;
            } else {
                await loadAnimeContent(null);
                hideLoading();
                return;
            }
        }
        try {
            const res = await fetch(url, { headers: { 'Authorization': `Bearer ${TMDB_READ_TOKEN}` } });
            const data = await res.json();
            currentItems = data.results || [];
            renderItems(currentItems, mediaType);
        } catch (e) {
            grid.innerHTML = '<p style="color:red;text-align:center;">Error</p>';
        } finally { hideLoading(); }
    }

    async function loadAnimeContent(genreId) {
        const movieUrl = `${API_BASE}/discover/movie?api_key=${TMDB_API_KEY}&with_genres=16&with_original_language=ja&page=${currentPage}&sort_by=popularity.desc`;
        const tvUrl = `${API_BASE}/discover/tv?api_key=${TMDB_API_KEY}&with_genres=16&with_original_language=ja&page=${currentPage}&sort_by=popularity.desc`;
        try {
            const [movieRes, tvRes] = await Promise.all([
                fetch(movieUrl, { headers: { 'Authorization': `Bearer ${TMDB_READ_TOKEN}` } }),
                fetch(tvUrl, { headers: { 'Authorization': `Bearer ${TMDB_READ_TOKEN}` } })
            ]);
            const movieData = await movieRes.json();
            const tvData = await tvRes.json();
            let combined = [...(movieData.results || []).map(m => ({...m, media_type: 'movie'})),
                           ...(tvData.results || []).map(t => ({...t, media_type: 'tv'}))];
            combined.sort((a,b) => (b.popularity||0) - (a.popularity||0));
            currentItems = combined;
            renderItems(combined, 'anime');
        } catch (e) { grid.innerHTML = '<p>Error loading anime</p>'; }
    }

    async function loadMoreContent() {
        if (isLoading) return;
        showLoading();
        if (mediaType === 'anime') {
            await loadAnimeContent(activeGenreId);
            hideLoading();
            return;
        }
        let url = '';
        if (mediaType === 'movie') {
            if (activeGenreId) {
                url = `${API_BASE}/discover/movie?api_key=${TMDB_API_KEY}&with_genres=${activeGenreId}&page=${currentPage}`;
            } else {
                url = `${API_BASE}/movie/popular?api_key=${TMDB_API_KEY}&page=${currentPage}`;
            }
        } else {
            if (activeGenreId) {
                url = `${API_BASE}/discover/tv?api_key=${TMDB_API_KEY}&with_genres=${activeGenreId}&page=${currentPage}`;
            } else {
                url = `${API_BASE}/tv/popular?api_key=${TMDB_API_KEY}&page=${currentPage}`;
            }
        }
        try {
            const res = await fetch(url, { headers: { 'Authorization': `Bearer ${TMDB_READ_TOKEN}` } });
            const data = await res.json();
            if (data.results) {
                renderItems(data.results, mediaType, true);
            }
        } catch (e) {} finally { hideLoading(); }
    }

    async function searchContent(query) {
        showLoading();
        grid.innerHTML = '';
        if (mediaType === 'anime') {
            const movieUrl = `${API_BASE}/search/movie?api_key=${TMDB_API_KEY}&query=${encodeURIComponent(query)}&page=${currentPage}&language=ja`;
            const tvUrl = `${API_BASE}/search/tv?api_key=${TMDB_API_KEY}&query=${encodeURIComponent(query)}&page=${currentPage}&language=ja`;
            try {
                const [mRes, tRes] = await Promise.all([
                    fetch(movieUrl, { headers: { 'Authorization': `Bearer ${TMDB_READ_TOKEN}` } }),
                    fetch(tvUrl, { headers: { 'Authorization': `Bearer ${TMDB_READ_TOKEN}` } })
                ]);
                const mData = await mRes.json();
                const tData = await tRes.json();
                let combined = [...(mData.results || []).map(m => ({...m, media_type: 'movie'})),
                               ...(tData.results || []).map(t => ({...t, media_type: 'tv'}))];
                currentItems = combined;
                renderItems(combined, 'anime');
            } catch(e){}
            hideLoading();
            return;
        }
        let url = mediaType === 'movie' 
            ? `${API_BASE}/search/movie?api_key=${TMDB_API_KEY}&query=${encodeURIComponent(query)}&page=${currentPage}`
            : `${API_BASE}/search/tv?api_key=${TMDB_API_KEY}&query=${encodeURIComponent(query)}&page=${currentPage}`;
        try {
            const res = await fetch(url, { headers: { 'Authorization': `Bearer ${TMDB_READ_TOKEN}` } });
            const data = await res.json();
            currentItems = data.results || [];
            renderItems(currentItems, mediaType);
        } catch (e) {} finally { hideLoading(); }
    }

    function renderItems(items, type, append = false) {
        if (!append) grid.innerHTML = '';
        items.forEach(item => {
            grid.appendChild(createCard(item, type));
        });
    }

    function createCard(item, forcedType) {
        const card = document.createElement('div');
        card.className = 'movie-card';
        let type = forcedType || mediaType;
        if (item.media_type) type = item.media_type;
        const title = (type === 'movie') ? (item.title || item.name) : (item.name || item.title);
        const date = (type === 'movie') ? (item.release_date) : (item.first_air_date);
        const year = date ? date.slice(0,4) : 'N/A';
        const rating = item.vote_average || 0;
        const ratingClass = rating >= 7.5 ? 'green' : rating >= 5 ? 'orange' : 'red';
        const poster = item.poster_path ? IMG_BASE+item.poster_path : 'https://via.placeholder.com/300x450?text=No+Poster';
        card.innerHTML = `
            <img class="movie-poster" src="${poster}" alt="${title}" loading="lazy">
            ${type==='tv'?'<span class="tv-badge">TV</span>':''}
            <div class="movie-info">
                <h3>${title}</h3>
                <div class="movie-meta"><span class="${ratingClass}"><i class="fas fa-star"></i>${rating.toFixed(1)}</span><span>${year}</span></div>
            </div>
            <div class="play-overlay" data-id="${item.id}" data-type="${type}"><i class="fas fa-play"></i></div>
        `;
        card.addEventListener('click', (e) => {
            if (!e.target.closest('.play-overlay')) openPlayer(item.id, type);
        });
        card.querySelector('.play-overlay').addEventListener('click', (e) => {
            e.stopPropagation(); openPlayer(item.id, type);
        });
        return card;
    }

    // ========== PLAYER ==========
    async function openPlayer(itemId, forcedType) {
        currentItemId = itemId;
        const type = forcedType || mediaType;
        const options = { headers: { 'Authorization': `Bearer ${TMDB_READ_TOKEN}` } };
        try {
            showLoading();
            if (type === 'movie') {
                const details = await fetch(`${API_BASE}/movie/${itemId}?api_key=${TMDB_API_KEY}`, options).then(r=>r.json());
                updateModalInfo(details, 'movie');
                movieTitleHeader.textContent = details.title;
                tvControls.style.display = 'none';
                langToggleContainer.style.display = 'none';
                if (mediaType === 'anime') {
                    langToggleContainer.style.display = 'flex';
                    createAnimeSourceButtons('movie');
                } else {
                    createSourceButtons('movie');
                }
                currentSourceIndex = 0;
                if (mediaType === 'anime') loadAnimeStream(0, 'movie');
                else loadMovieStream(0);
            } else {
                const details = await fetch(`${API_BASE}/tv/${itemId}?api_key=${TMDB_API_KEY}`, options).then(r=>r.json());
                currentTVDetails = details;
                updateModalInfo(details, 'tv');
                movieTitleHeader.textContent = details.name;
                setupSeasonSelector(details);
                tvControls.style.display = 'flex';
                langToggleContainer.style.display = mediaType==='anime'?'flex':'none';
                if (mediaType === 'anime') {
                    createAnimeSourceButtons('tv');
                } else {
                    createSourceButtons('tv');
                }
                if (details.seasons?.length) {
                    currentSeason = details.seasons[0].season_number || 1;
                    await loadEpisodesForSeason(currentSeason);
                }
                currentSourceIndex = 0;
                if (mediaType === 'anime') loadAnimeStream(0, 'tv');
                else loadTVStream(0);
            }
            modal.style.display = 'block';
            document.body.style.overflow = 'hidden';
            
            // Setup skip buttons for TV/Anime
            if (type === 'tv' || mediaType === 'anime') {
                setupSkipButtons();
            }
        } catch (err) {
            alert('Cannot open player');
        } finally { hideLoading(); }
    }

    function updateModalInfo(item, type) {
        modalPoster.src = item.poster_path ? IMG_BASE+item.poster_path : '';
        modalTitle.textContent = type==='movie'? item.title : item.name;
        const year = type==='movie'? (item.release_date||'').slice(0,4) : (item.first_air_date||'').slice(0,4);
        modalYear.textContent = year || 'N/A';
        const rating = item.vote_average || 0;
        modalRating.innerHTML = `<i class="fas fa-star"></i> ${rating.toFixed(1)}`;
        if (rating >= 7.5) modalRating.className = 'green';
        else if (rating >=5) modalRating.className = 'orange';
        else modalRating.className = 'red';
        const runtime = type==='movie'? (item.runtime ? item.runtime+' min' : 'N/A') : (item.episode_run_time?.[0] ? item.episode_run_time[0]+' min' : 'N/A');
        modalRuntime.textContent = runtime;
        const genreNames = item.genres?.map(g=>g.name).join(', ') || '—';
        modalGenresSpan.textContent = genreNames;
        modalOverview.textContent = item.overview || 'No description.';
    }

    function createSourceButtons(type) {
        const sources = STREAMING_SOURCES[type] || [];
        sourceButtons.innerHTML = '';
        sources.forEach((src, idx) => {
            const btn = document.createElement('button');
            btn.className = 'source-btn' + (idx===0?' active':'');
            btn.textContent = src.name;
            btn.dataset.index = idx;
            btn.addEventListener('click', () => {
                document.querySelectorAll('.source-btn').forEach(b=>b.classList.remove('active'));
                btn.classList.add('active');
                currentSourceIndex = idx;
                if (type === 'movie') loadMovieStream(idx);
                else loadTVStream(idx);
                resetSkipButtons();
            });
            sourceButtons.appendChild(btn);
        });
    }

    function createAnimeSourceButtons(aniType) {
        const sources = STREAMING_SOURCES.anime[aniType] || [];
        sourceButtons.innerHTML = '';
        sources.forEach((src, idx) => {
            const btn = document.createElement('button');
            btn.className = 'source-btn' + (idx===0?' active':'');
            btn.textContent = src.name + (currentLang==='dub'?' (DUB)':' (SUB)');
            btn.dataset.index = idx;
            btn.addEventListener('click', () => {
                document.querySelectorAll('.source-btn').forEach(b=>b.classList.remove('active'));
                btn.classList.add('active');
                currentSourceIndex = idx;
                loadAnimeStream(idx, aniType);
                resetSkipButtons();
            });
            sourceButtons.appendChild(btn);
        });
    }

    function loadMovieStream(index) {
        const sources = STREAMING_SOURCES.movie;
        if (index >= sources.length) { tryNextSource(0); return; }
        currentSourceIndex = index;
        const url = sources[index].url(currentItemId);
        playerError.style.display = 'none';
        player.src = '';
        setTimeout(() => { player.src = url; }, 100);
    }

    function loadTVStream(index) {
        const sources = STREAMING_SOURCES.tv;
        if (index >= sources.length) { tryNextSource(0); return; }
        currentSourceIndex = index;
        const url = sources[index].url(currentItemId, currentSeason, currentEpisode);
        playerError.style.display = 'none';
        player.src = '';
        setTimeout(() => { player.src = url; setupSkipButtons(); }, 100);
    }

    function loadAnimeStream(index, aniType) {
        const sources = STREAMING_SOURCES.anime[aniType] || [];
        if (index >= sources.length) { tryNextSource(0); return; }
        currentSourceIndex = index;
        let url;
        if (aniType === 'movie') {
            url = sources[index].url(currentItemId, currentLang);
        } else {
            url = sources[index].url(currentItemId, currentSeason, currentEpisode, currentLang);
        }
        playerError.style.display = 'none';
        player.src = '';
        setTimeout(() => { player.src = url; setupSkipButtons(); }, 100);
    }

    function tryNextSource(nextIdx) {
        if (mediaType === 'anime') {
            let aniType = currentTVDetails ? 'tv' : 'movie';
            loadAnimeStream(nextIdx, aniType);
        } else if (mediaType === 'movie') loadMovieStream(nextIdx);
        else loadTVStream(nextIdx);
    }

    function reloadCurrentSource() {
        if (mediaType === 'anime') {
            let aniType = currentTVDetails ? 'tv' : 'movie';
            loadAnimeStream(currentSourceIndex, aniType);
        } else if (mediaType === 'movie') loadMovieStream(currentSourceIndex);
        else loadTVStream(currentSourceIndex);
    }

    async function setupSeasonSelector(tvDetails) {
        seasonSelect.innerHTML = '';
        tvDetails.seasons?.forEach(s => {
            if (s.season_number > 0) {
                const opt = document.createElement('option'); opt.value = s.season_number; opt.textContent = `Season ${s.season_number}`;
                seasonSelect.appendChild(opt);
            }
        });
        if (seasonSelect.options.length) currentSeason = parseInt(seasonSelect.value);
    }
    async function loadEpisodesForSeason(seasonNum) {
        const options = { headers: { 'Authorization': `Bearer ${TMDB_READ_TOKEN}` } };
        const url = `${API_BASE}/tv/${currentItemId}/season/${seasonNum}?api_key=${TMDB_API_KEY}`;
        const res = await fetch(url, options);
        const data = await res.json();
        episodeSelect.innerHTML = '';
        data.episodes?.forEach(ep => {
            const opt = document.createElement('option'); opt.value = ep.episode_number; opt.textContent = `Ep ${ep.episode_number}: ${ep.name}`;
            episodeSelect.appendChild(opt);
        });
        if (episodeSelect.options.length) { currentEpisode = parseInt(episodeSelect.value); }
    }

    function closePlayer() {
        player.src = '';
        modal.style.display = 'none';
        document.body.style.overflow = 'auto';
        playerError.style.display = 'none';
        resetSkipButtons();
    }

    function toggleFullscreenModal() {
        if (!document.fullscreenElement) modal.requestFullscreen();
        else document.exitFullscreen();
    }

    function showLoading() { loadingSpinner.style.display = 'block'; isLoading = true; }
    function hideLoading() { loadingSpinner.style.display = 'none'; isLoading = false; }
    function setupScrollHeader() {
        window.addEventListener('scroll', ()=> {
            document.getElementById('main-header').classList.toggle('compact', window.scrollY>60);
        });
    }
})();
</script>
<!-- cancel any adds popup (simple alert override) – optional but prevents some adds -->
<script>
    window.addEventListener('load', function() {
        const originalAlert = window.alert;
        window.alert = function(msg) {
            if (msg && msg.toString().toLowerCase().includes('add')) return;
            originalAlert(msg);
        };
        const originalOpen = window.open;
        window.open = function(url, ...rest) {
            if (url && (url.includes('ad') || url.includes('pop'))) {
                console.warn('add cancelled');
                return null;
            }
            return originalOpen.call(window, url, ...rest);
        };
    });
</script>
